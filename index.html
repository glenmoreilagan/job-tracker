<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="max-w-7xl mx-auto p-5">

    <h1 class="text-3xl font-bold mb-6">
        Job Application Tracker
    </h1>

    <!-- FORM -->

    <div class="bg-white rounded-lg shadow p-5">

        <div class="grid md:grid-cols-2 gap-4">

            <input
                id="company"
                type="text"
                placeholder="Company"
                class="border rounded p-2 w-full">

            <input
                id="jobTitle"
                type="text"
                placeholder="Job Title"
                class="border rounded p-2 w-full">

            <select
                id="status"
                class="border rounded p-2">

                <option>Applied</option>
                <option>Interview</option>
                <option>Exam</option>
                <option>Offer</option>
                <option>Rejected</option>

            </select>

            <input
                id="remarks"
                type="text"
                placeholder="Remarks"
                class="border rounded p-2">

        </div>

        <textarea
            id="notes"
            rows="3"
            placeholder="Notes / Comments"
            class="border rounded p-2 w-full mt-4"></textarea>

        <button
            onclick="saveJob()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded mt-4">

            Save

        </button>

    </div>

    <!-- TABLE -->

    <div class="bg-white rounded-lg shadow mt-8 overflow-x-auto">

        <table class="min-w-full">

            <thead class="bg-gray-200">

            <tr>

                <th class="p-3 text-left">Company</th>
                <th class="p-3 text-left">Job Title</th>
                <th class="p-3 text-left">Status</th>
                <th class="p-3 text-left">Remarks</th>
                <th class="p-3 text-left">Notes</th>
                <th class="p-3 text-center">Action</th>

            </tr>

            </thead>

            <tbody id="tableBody"></tbody>

        </table>

    </div>

</div>

<script>

let jobs = JSON.parse(localStorage.getItem("jobs")) || [];

let editIndex = null;


//============================
// Save
//============================

function saveJob(){

    const company = document.getElementById("company").value;
    const jobTitle = document.getElementById("jobTitle").value;
    const status = document.getElementById("status").value;
    const remarks = document.getElementById("remarks").value;
    const notes = document.getElementById("notes").value;

    if(company === "" || jobTitle === ""){

        alert("Company and Job Title are required.");
        return;

    }

    const job = {

        company,
        jobTitle,
        status,
        remarks,
        notes

    };

    if(editIndex === null){

        jobs.push(job);

    }else{

        jobs[editIndex] = job;
        editIndex = null;

    }

    saveLocalStorage();

    clearForm();

    render();

}


//============================
// Render Table
//============================

function render(){

    const tbody = document.getElementById("tableBody");

    tbody.innerHTML = "";

    jobs.forEach((job,index)=>{

        tbody.innerHTML += `

        <tr class="border-b">

            <td class="p-3">${job.company}</td>

            <td class="p-3">${job.jobTitle}</td>

            <td class="p-3">

                <span class="px-3 py-1 rounded text-white ${statusColor(job.status)}">

                    ${job.status}

                </span>

            </td>

            <td class="p-3">${job.remarks}</td>

            <td class="p-3">${job.notes}</td>

            <td class="p-3">

                <div class="flex gap-2 justify-center">

                    <button
                        onclick="editJob(${index})"
                        class="bg-yellow-500 text-white px-3 py-1 rounded">

                        Edit

                    </button>

                    <button
                        onclick="deleteJob(${index})"
                        class="bg-red-500 text-white px-3 py-1 rounded">

                        Delete

                    </button>

                </div>

            </td>

        </tr>

        `;

    });

}


//============================
// Edit
//============================

function editJob(index){

    const job = jobs[index];

    document.getElementById("company").value = job.company;
    document.getElementById("jobTitle").value = job.jobTitle;
    document.getElementById("status").value = job.status;
    document.getElementById("remarks").value = job.remarks;
    document.getElementById("notes").value = job.notes;

    editIndex = index;

}


//============================
// Delete
//============================

function deleteJob(index){

    if(confirm("Delete this record?")){

        jobs.splice(index,1);

        saveLocalStorage();

        render();

    }

}


//============================
// Save LocalStorage
//============================

function saveLocalStorage(){

    localStorage.setItem("jobs",JSON.stringify(jobs));

}


//============================
// Clear Form
//============================

function clearForm(){

    document.getElementById("company").value="";
    document.getElementById("jobTitle").value="";
    document.getElementById("status").value="Applied";
    document.getElementById("remarks").value="";
    document.getElementById("notes").value="";

}


//============================
// Badge Color
//============================

function statusColor(status){

    switch(status){

        case "Applied":
            return "bg-blue-500";

        case "Interview":
            return "bg-yellow-500";

        case "Exam":
            return "bg-purple-500";

        case "Offer":
            return "bg-green-600";

        case "Rejected":
            return "bg-red-600";

        default:
            return "bg-gray-500";

    }

}


render();

</script>

</body>
</html>
